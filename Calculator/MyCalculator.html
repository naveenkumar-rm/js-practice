<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <style>
    body {
      text-align: center;
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <input id="num1" placeholder="Number 1">
  <br><br>
  
  <input id="num2" placeholder="Number 2">
  <br><br>

  <input id="operator" placeholder="Operator (+, -, *, /)">
  <br><br>

  <button onclick="calculate()">Calculate</button>

  <h3 id="result">Result: </h3>

  <script>
    function calculate() {
      let a = document.getElementById("num1").value;
      let b = document.getElementById("num2").value;
      let op = document.getElementById("operator").value;
      let c;

      a = parseInt(a);
      b = parseInt(b);


      switch (op) {
        case '+':
          c = a + b;
          break;
        case '-':
          c = a - b;
          break;
        case '*':
          c = a * b;
          break;
        case '/':
          c = b !== 0 ? a / b : "Cannot divide by zero";
          break;
        default:
          c = "Invalid operation";
      }

      document.getElementById("result").innerText = "Result: " + c;
    }
  </script>

</body>
</html>
