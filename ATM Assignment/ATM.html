<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="ATM.css">
    <title>ATM</title>
</head>
<body>
    <div class="atm">
    <h1 style="text-align: center;">YES BANK ATM</h1>
    <input class="atm_input" id="card" type="number" placeholder="Enter your Card number">
    <input class="atm_input" id="pin" type="password" placeholder="Enter Your pin">
    <input class="atm_input" id="amount" type="number" placeholder="Enter Amount">

    <button class="atm_button" onclick="">Deposit</button>
    <button class="atm_button">withdraw</button>
    <button class="atm_button">checkbalance</button>

    <div id="output"></div>
    </div>
    <script src="ATM.js"></script>
</body>
</html>
